; WireClaw - ESP32 AI Agent
;
; Build:   pio run                    (builds default target: esp32-c6)
; Upload:  pio run -t upload
; Monitor: pio device monitor
; FS:      pio run -t uploadfs
;
; Windows + AVG: use scripts (plain pio fails on HTTPS downloads):
;   .\scripts\setup-pio-ssl.ps1          (one-time SSL fix)
;   .\scripts\bootstrap-platform.ps1     (one-time, ESP32-C6 platform)
;   python scripts\flash.py --port COM3
;   .\scripts\pio.ps1 run -e esp32-c6 -t upload --upload-port COM3
;
; Other targets: pio run -e esp32-s3, pio run -e esp32, pio run -e esp32-c3

[platformio]
default_envs = esp32-c6-lcd

[env]
; Local copy installed by scripts/bootstrap-platform.ps1 (pioarduino stable).
; GitHub zip URL fails under AVG when SSLKEYLOGFILE / cert MITM breaks Python HTTPS:
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
platform = espressif32
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB
monitor_speed = 115200
monitor_filters = colorize, time

[env:esp32-c6]
board = esp32-c6-devkitc-1
; upload_port / monitor_port: set via CLI (--upload-port COMx) or scripts/flash.py
; Linux default: /dev/ttyACM0

; Waveshare ESP32-C6-LCD-1.47 — 1.47" ST7789 172x320, RGB LED on GPIO8
; https://www.waveshare.com/wiki/ESP32-C6-LCD-1.47
[env:esp32-c6-lcd]
extends = env:esp32-c6
board_upload.flash_size = 8MB
build_flags =
  -DWIRECLAW_LCD_WS147=1
  -DWIRECLAW_RGB_PIN=8

[env:esp32-s3]
board = esp32-s3-devkitc-1

; Classic ESP32 not supported: DRAM overflow (~60KB over dram0_0_seg limit)
; due to large static buffers (LLM request, history, TLS). Use ESP32-C3 instead.
;[env:esp32]
;board = esp32dev

[env:esp32-c3]
board = esp32-c3-devkitm-1
